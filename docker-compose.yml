services:
  db:
    image: pgvector/pgvector:0.8.0-pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-4444}
      POSTGRES_DB: ${POSTGRES_DB:-apt_insight}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
      - app_data:/app/data

  dashboard:
    build: .
    restart: unless-stopped
    command: ["gunicorn", "dash_app.app:server", "-b", "0.0.0.0:8050", "-w", "2", "--timeout", "120"]
    ports:
      - "8050:8050"
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
      - app_data:/app/data

volumes:
  pgdata:
  uploads:
  app_data:
